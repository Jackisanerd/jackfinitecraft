<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackfinite Craft</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sidebar-width: 300px;
    --drawer-height: 42vh;
    --border: #c8c8c8;
    --item-border: #91a8c1;
    --instance-bg: linear-gradient(0deg, #f7feff, #fff 70%);
    --instance-bg-hover: linear-gradient(0deg, #d6fcff, #fff 90%);
    --bg: #fff;
    --text: #040404;
    --sidebar-bg: #fff;
    --item-bg: #fff;
    --item-bg-hover: linear-gradient(0deg, #f0feff, #fff 80%);
    --modal-bg: #fff;
    --toast-bg: #fff;
  }
  body.dark {
    --border: #3a3a3a;
    --item-border: #4a6a8a;
    --instance-bg: linear-gradient(0deg, #1a2a3a, #1e1e1e 70%);
    --instance-bg-hover: linear-gradient(0deg, #1a3a4a, #1e1e1e 90%);
    --bg: #121212;
    --text: #e8e8e8;
    --sidebar-bg: #1a1a1a;
    --item-bg: #1a1a1a;
    --item-bg-hover: linear-gradient(0deg, #1a2a3a, #1e1e1e 80%);
    --modal-bg: #1e1e1e;
    --toast-bg: #1e1e1e;
  }
  .dark-btn {
    position: fixed; top: 12px; left: 12px;
    z-index: 10; background: none; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; font-size: 16px;
    padding: 4px 8px; color: var(--text); transition: background 0.1s;
  }
  .dark-btn:hover { background: rgba(128,128,128,0.15); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; height: 100dvh;
    overflow: hidden; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  
  .title {
    position: fixed; top: 12px;
    right: calc(var(--sidebar-width) + 14px);
    text-align: right; pointer-events: none; z-index: 5; line-height: 1.1;
  }
  .title-main { font-size: 1.75rem; font-weight: 300; letter-spacing: -0.5px; }
  .title-sub  { font-size: 1.75rem; font-weight: 700; }

  
  #canvas {
    position: fixed; top: 0; left: 0;
    width: calc(100% - var(--sidebar-width));
    height: 100vh; height: 100dvh;
    overflow: hidden; background: var(--bg);
  }

  
  .instance {
    position: absolute; display: flex; align-items: center;
    background: var(--instance-bg);
    border: 2px solid var(--item-border); border-radius: 10px;
    padding: 0 18px; height: 78px;
    white-space: nowrap; cursor: grab; z-index: 11;
    animation: scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
    will-change: transform; touch-action: none;
  }
  @keyframes scaleIn {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .instance:hover, .instance.selected {
    background: var(--instance-bg-hover); border-color: var(--item-border);
  }
  .instance.combining { opacity: 0.6; pointer-events: none; }
  .instance-emoji { font-size: 38px; margin-right: 10px; pointer-events: none; }
  .instance-text  { font-size: 34px; pointer-events: none; font-weight: 400; }

  
  #sidebar {
    position: fixed; top: 0; right: 0;
    width: var(--sidebar-width); height: 100vh; height: 100dvh;
    border-left: 1px solid var(--border); background: var(--sidebar-bg);
    display: flex; flex-direction: column; z-index: 10; overflow: hidden;
  }
  .items-wrap {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-wrap: wrap; align-content: flex-start;
  }
  .items-wrap::-webkit-scrollbar { width: 4px; }
  .items-wrap::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  .sidebar-item {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--item-bg); border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 10px; margin: 4px; font-size: 13.5px;
    cursor: grab; white-space: nowrap; transition: background 0.1s;
    touch-action: none;
  }
  .sidebar-item:hover {
    background: var(--item-bg-hover);
    border-color: var(--item-border);
  }
  .sidebar-item.dragging-from-sidebar { opacity: 0.4; }

  .sidebar-bottom { flex-shrink: 0; border-top: 1px solid var(--border); }
  .sort-tabs {
    display: grid; grid-template-columns: 1fr 1fr 36px;
    gap: 4px; padding: 0 8px; cursor: pointer;
  }
  .sort-tab {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 13px; height: 30px;
    border: 1px solid var(--border); border-bottom: none;
    border-radius: 8px 8px 0 0; transform: translateY(1px);
    background: var(--item-bg); color: #444;
  }
  .sort-tab:hover  { background: #f5feff; }
  .sort-tab.active { background: linear-gradient(0deg, #d6fcff, #fff 90%); }
  .search-row {
    display: flex; align-items: center;
    border-top: 1px solid var(--border); position: relative;
  }
  .search-icon { position: absolute; left: 10px; font-size: 15px; color: #aaa; pointer-events: none; }
  .search-input {
    width: 100%; border: none; outline: none;
    font-size: 14px; font-family: 'Roboto', sans-serif;
    height: 40px; padding: 0 12px 0 34px; color: var(--text); background: transparent;
  }
  .search-input::placeholder { color: #aaa; }

  
  .bottom-controls {
    position: fixed; bottom: 10px; right: calc(var(--sidebar-width) + 14px);
    display: flex; gap: 18px; align-items: center; z-index: 5; opacity: 0.7;
  }
  .ctrl-btn {
    cursor: pointer; font-size: 18px; background: none; border: none;
    padding: 4px; color: #555; transition: transform 0.1s;
  }
  .ctrl-btn:hover { transform: scale(1.1); color: #000; }
  .item-count {
    position: fixed; bottom: 10px; left: 14px;
    font-size: 12px; color: #aaa; z-index: 5; pointer-events: none;
  }

  
  .result-toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(calc(-50% - var(--sidebar-width)/2)) scale(0);
    background: var(--toast-bg); border: 1px solid var(--item-border); border-radius: 10px;
    padding: 10px 22px; text-align: center; z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; white-space: nowrap;
  }
  .result-toast.show { transform: translateX(calc(-50% - var(--sidebar-width)/2)) scale(1); }
  .result-toast-emoji { font-size: 1.8rem; }
  .result-toast-name  { font-size: 1rem; font-weight: 500; margin-top: 2px; }
  .result-toast-combo { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .first-disc      { font-size: 0.7rem; color: #888; margin-top: 3px; }
  .first-disc span { background: #fffbe6; border: 1px solid #ffe066; border-radius: 4px; padding: 1px 6px; }

  
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 300;
  }
  .modal {
    background: var(--modal-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 32px; max-width: 360px; width: 90%; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .modal p  { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }
  .modal input {
    width: 100%; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 16px; font-family: 'Roboto', sans-serif;
    outline: none; margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--item-border); }
  .modal-btn {
    width: 100%; background: #1a73e8; color: #fff; border: none;
    border-radius: 6px; padding: 9px; font-size: 14px;
    font-family: 'Roboto', sans-serif; cursor: pointer;
  }
  .modal-btn:hover { background: #1558b0; }
  .modal-skip { font-size: 12px; color: #aaa; margin-top: 10px; cursor: pointer; }
  .modal-skip:hover { color: #555; }

  
  .ghost {
    position: fixed; display: flex; align-items: center;
    background: var(--instance-bg-hover); border: 2px solid var(--item-border);
    border-radius: 10px; padding: 0 18px; height: 78px;
    white-space: nowrap; pointer-events: none; z-index: 999; opacity: 0.85;
  }
  .ghost-emoji { font-size: 38px; margin-right: 10px; }
  .ghost-text  { font-size: 34px; font-weight: 400; }

  
  .delete-hint {
    position: fixed; bottom: 10px; left: 50%;
    transform: translateX(calc(-50% - var(--sidebar-width)/2));
    font-size: 11px; color: #bbb; pointer-events: none; z-index: 4;
  }

  
  @media (max-width: 640px) {
    :root { --drawer-height: 42vh; }

    
    .title {
      right: auto; left: 12px; top: 8px; text-align: left;
    }
    .title-main { font-size: 1.1rem; }
    .title-sub  { font-size: 1.1rem; }

    
    #canvas {
      width: 100%;
      height: calc(100dvh - var(--drawer-height));
    }

    
    .instance { height: 52px; padding: 0 10px; border-radius: 8px; }
    .instance-emoji { font-size: 22px; margin-right: 6px; }
    .instance-text  { font-size: 18px; }

    
    .ghost { height: 52px; padding: 0 10px; border-radius: 8px; }
    .ghost-emoji { font-size: 22px; margin-right: 6px; }
    .ghost-text  { font-size: 18px; }

    
    #sidebar {
      top: auto; right: 0; bottom: 0; left: 0;
      width: 100%; height: var(--drawer-height);
      border-left: none; border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.07);
    }

    
    #sidebar::before {
      content: '';
      display: block; flex-shrink: 0;
      width: 36px; height: 4px; border-radius: 2px;
      background: #ddd;
      margin: 8px auto 4px;
    }

    
    .items-wrap {
      flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
      padding: 6px 8px; align-content: center;
    }
    .items-wrap::-webkit-scrollbar { height: 3px; width: 0; }
    .items-wrap::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .sidebar-item { font-size: 12px; padding: 4px 8px; margin: 3px; flex-shrink: 0; }

    
    .bottom-controls {
      right: 10px;
      bottom: calc(var(--drawer-height) + 6px);
    }
    .item-count {
      left: 10px;
      bottom: calc(var(--drawer-height) + 8px);
    }
    .delete-hint {
      transform: translateX(-50%);
      bottom: calc(var(--drawer-height) + 8px);
      font-size: 10px;
    }

    
    .result-toast {
      transform: translateX(-50%) scale(0);
      bottom: calc(var(--drawer-height) + 14px);
      max-width: 90vw; white-space: normal; text-align: center;
    }
    .result-toast.show { transform: translateX(-50%) scale(1); }

    
    .sort-tab { font-size: 11px; height: 26px; }
    .search-input { height: 34px; font-size: 13px; }
  }
</style>
</head>
<body>

<button class="dark-btn" id="darkBtn">🌙</button>

<div class="title">
  <div class="title-main">Jackfinite</div>
  <div class="title-sub">Craft</div>
</div>

<div id="canvas"></div>

<div id="sidebar">

  <div class="sidebar-bottom">

      <div class="sort-tab"        id="tabTime"><span>🕐</span> Time</div>
      <div class="sort-tab"        id="tabTrash">🗑️</div>
    </div>
    <div class="search-row">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search items..." />
    </div>
  </div>
</div>

<div class="result-toast" id="resultToast">
  <div class="result-toast-emoji" id="rEmoji"></div>
  <div class="result-toast-name"  id="rName"></div>
  <div class="result-toast-combo" id="rCombo"></div>
  <div class="first-disc" id="rFirst" style="display:none"></div>
</div>
<div class="item-count" id="itemCount">4 elements</div>

<div class="bottom-controls">
  <button class="ctrl-btn" id="soundBtn">🔊</button>
  <button class="ctrl-btn" id="clearBtn">🧹</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div style="font-size:2rem;margin-bottom:8px">🧪</div>
    <h2>Set a username</h2>
    <p>Your username is saved locally so you can track your own discoveries!</p>
    <input type="text" id="usernameInput" placeholder="Your username…" maxlength="30" />
    <button class="modal-btn" id="modalConfirm">Start Crafting →</button>
    <div class="modal-skip" id="modalSkip">Skip (play anonymously)</div>
  </div>
</div>

function saveDiscovered() {
  try {
    localStorage.setItem(STORAGE_KEY_DISC, JSON.stringify(
      discovered.map(({ emoji, name, id, time }) => ({ emoji, name, id, time }))
    ));
  } catch(e) {}
}

  try {
    const raw = localStorage.getItem(STORAGE_KEY_DISC);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;

function getName(s) {
  return s.replace(/^[^A-Za-z0-9]+/, '').trim();

function smartFallback(na, nb) {
  if (!isPrimitive(na) || !isPrimitive(nb)) return null;
  const a = na.replace(/\s+/g,''), b = nb.replace(/\s+/g,'');
  const candidate = a.slice(0, Math.ceil(a.length/2)) + b.slice(Math.floor(b.length/2));
  if (candidate.length < 4) return null;
  if (!/[aeiouAEIOU]/.test(candidate)) return null;
  const vowels = (candidate.match(/[aeiouAEIOU]/g)||[]).length;
  const ratio  = vowels / candidate.length;
  if (ratio < 0.2 || ratio > 0.8) return null;
  const pool = ['✨','🔮','💫','🌀','⚡','🎭','💥','🌟','🔥','💎','🪄','🌈'];
  return {
    emoji: pool[(a.charCodeAt(0)+b.charCodeAt(0)) % pool.length],
    name:  candidate.charAt(0).toUpperCase() + candidate.slice(1)
  };
}

      g.gain.setValueAtTime(0.15,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
      o.start();o.stop(c.currentTime+0.2);
    }else if(t==='discovery'){
      [523,659,784,1047].forEach((f,i)=>{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.frequency.value=f;
        g.gain.setValueAtTime(0.12,c.currentTime+i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.18);
        o.start(c.currentTime+i*0.1);o.stop(c.currentTime+i*0.1+0.18);
      });
    }
  }catch(e){}
}

const savedUser = localStorage.getItem(STORAGE_KEY_USER);
if (savedUser) {
  username = savedUser;
  document.getElementById('modalOverlay').style.display = 'none';
}
document.getElementById('modalConfirm').onclick = () => {
  username = document.getElementById('usernameInput').value.trim() || 'Anonymous';
  localStorage.setItem(STORAGE_KEY_USER, username);
  document.getElementById('modalOverlay').style.display = 'none';
};
document.getElementById('modalSkip').onclick = () => {
  username = 'Anonymous';
  document.getElementById('modalOverlay').style.display = 'none';
};
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
});

function renderSidebar(){
  let items=[...discovered];
  if(sortMode==='time') items.sort((a,b)=>b.time-a.time);
  if(searchQ) items=items.filter(e=>e.name.toLowerCase().includes(searchQ));
  itemsList.innerHTML='';
  items.forEach(e=>{
    const el=document.createElement('div');
    el.className='sidebar-item';
    el.innerHTML=`<span>${e.emoji}</span><span>${e.name}</span>`;
    el.addEventListener('mousedown',ev=>onSidebarMouseDown(ev,e));
    el.addEventListener('touchstart',ev=>onSidebarTouchStart(ev,e),{passive:false});
    itemsList.appendChild(el);
  });
  document.getElementById('itemCount').textContent=
    `${discovered.length} element${discovered.length!==1?'s':''}`;
}

document.getElementById('searchInput').oninput=e=>{searchQ=e.target.value.toLowerCase();renderSidebar();};
document.getElementById('tabDisc').onclick=()=>{
  sortMode='disc';
  document.getElementById('tabDisc').classList.add('active');
  document.getElementById('tabTime').classList.remove('active');
  renderSidebar();
};
document.getElementById('tabTime').onclick=()=>{
  sortMode='time';
  document.getElementById('tabTime').classList.add('active');
  document.getElementById('tabDisc').classList.remove('active');
  renderSidebar();
};
document.getElementById('tabTrash').onclick=()=>{
  if(confirm('Reset all discoveries? This cannot be undone.')){
    discovered=STARTERS.map((s,i)=>({...s,id:i,time:i}));
    nextId=STARTERS.length;
    saveDiscovered();
    renderSidebar();
  }
};
document.getElementById('soundBtn').onclick=()=>{
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
};
document.getElementById('clearBtn').onclick=()=>{canvasEls.forEach(e=>e.remove());canvasEls=[];};

function isMobile(){ return window.innerWidth <= 640; }

function createGhost(data,cx,cy){
  const mob=isMobile();
  const g=document.createElement('div');
  g.className='ghost';
  g.innerHTML=`<span class="ghost-emoji">${data.emoji}</span><span class="ghost-text">${data.name}</span>`;
  if(mob){ g.style.fontSize='18px'; }
  g.style.left=(cx-(mob?16:30))+'px';
  g.style.top=(cy-(mob?26:39))+'px';
  document.body.appendChild(g);return g;
}
function moveGhost(cx,cy){
  const mob=isMobile();
  if(sidebarGhost){
    sidebarGhost.style.left=(cx-(mob?16:30))+'px';
    sidebarGhost.style.top=(cy-(mob?26:39))+'px';
  }
}

function deleteInstance(el){
  el.style.transition='transform 0.15s, opacity 0.15s';
  el.style.transform='scale(0)';
  el.style.opacity='0';
  setTimeout(()=>{
    el.remove();
    canvasEls=canvasEls.filter(e=>e!==el);
  },150);
}

function spawnInstance(data,x,y){
  if(x===undefined){
    const mob  = isMobile();
    const pad  = mob ? 20  : 60;
    const chipW = mob ? 100 : 260;
    const chipH = mob ? 52  : 78;
    x = pad + Math.random() * Math.max(10, canvas.clientWidth  - chipW - pad);
    y = pad + Math.random() * Math.max(10, canvas.clientHeight - chipH - pad * 2);
  }
  const el=document.createElement('div');
  el.className='instance';
  el.style.left=x+'px';el.style.top=y+'px';
  el.innerHTML=`<span class="instance-emoji">${data.emoji}</span><span class="instance-text">${data.name}</span>`;
  el._data=data;
  el._clickTime=0;

  
  el.addEventListener('contextmenu',e=>{
    e.preventDefault();
    deleteInstance(el);
  });

  
  el.addEventListener('dblclick',e=>{
    e.preventDefault();
    spawnInstance(data, parseFloat(el.style.left)+30, parseFloat(el.style.top)+30);
  });

  el.addEventListener('mousedown',onMouseDown);
  el.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.appendChild(el);canvasEls.push(el);
  return el;
}

function onSidebarMouseDown(e,data){
  e.preventDefault();
  _sidebarDragStartX=e.clientX; _sidebarDragStartY=e.clientY;
  draggingFromSidebar=data;
  e.currentTarget.classList.add('dragging-from-sidebar');
  sidebarGhost=createGhost(data,e.clientX,e.clientY);
  playSound('pickup');
  window.addEventListener('mousemove',onSidebarMouseMove);
  window.addEventListener('mouseup',onSidebarMouseUp);
}
function onSidebarMouseMove(e){moveGhost(e.clientX,e.clientY);}
let _sidebarDragStartX=0, _sidebarDragStartY=0;

function onSidebarMouseUp(e){
  window.removeEventListener('mousemove',onSidebarMouseMove);
  window.removeEventListener('mouseup',onSidebarMouseUp);
  const dx=e.clientX-_sidebarDragStartX, dy=e.clientY-_sidebarDragStartY;
  const wasDrag=Math.sqrt(dx*dx+dy*dy)>8;
  if(sidebarGhost){sidebarGhost.remove();sidebarGhost=null;}
  document.querySelectorAll('.dragging-from-sidebar').forEach(el=>el.classList.remove('dragging-from-sidebar'));
  const r=canvas.getBoundingClientRect();
  if(!wasDrag){
    
    spawnInstance(draggingFromSidebar);
    playSound('pickup');
  } else if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
    const mob=isMobile();
    spawnInstance(draggingFromSidebar,e.clientX-r.left-(mob?16:30),e.clientY-r.top-(mob?26:39));
  }
  draggingFromSidebar=null;
}

function onSidebarTouchStart(e,data){
  e.preventDefault();
  const t=e.touches[0];
  _sidebarDragStartX=t.clientX; _sidebarDragStartY=t.clientY;
  draggingFromSidebar=data;
  e.currentTarget.classList.add('dragging-from-sidebar');
  sidebarGhost=createGhost(data,t.clientX,t.clientY);
  playSound('pickup');
  window.addEventListener('touchmove',onSidebarTouchMove,{passive:false});
  window.addEventListener('touchend',onSidebarTouchEnd);
}
function onSidebarTouchMove(e){e.preventDefault();moveGhost(e.touches[0].clientX,e.touches[0].clientY);}
function onSidebarTouchEnd(e){
  window.removeEventListener('touchmove',onSidebarTouchMove);
  window.removeEventListener('touchend',onSidebarTouchEnd);
  const t=e.changedTouches[0];
  const dx=t.clientX-_sidebarDragStartX, dy=t.clientY-_sidebarDragStartY;
  const wasDrag=Math.sqrt(dx*dx+dy*dy)>8;
  if(sidebarGhost){sidebarGhost.remove();sidebarGhost=null;}
  document.querySelectorAll('.dragging-from-sidebar').forEach(el=>el.classList.remove('dragging-from-sidebar'));
  const r=canvas.getBoundingClientRect();
  if(!wasDrag){
    spawnInstance(draggingFromSidebar);
    playSound('pickup');
  } else if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
    const mob=isMobile();
    spawnInstance(draggingFromSidebar,t.clientX-r.left-(mob?16:30),t.clientY-r.top-(mob?26:39));
  }
  draggingFromSidebar=null;
}

let dragMoved=false;

function onMouseDown(e){
  e.preventDefault();
  dragMoved=false;
  playSound('pickup');
  startDrag(e.currentTarget,e.clientX,e.clientY);
  window.addEventListener('mousemove',onMouseMove);
  window.addEventListener('mouseup',onMouseUp);
}
function onMouseMove(e){
  if(dragging){ dragMoved=true; moveDrag(e.clientX,e.clientY); }
}
function onMouseUp(e){
  window.removeEventListener('mousemove',onMouseMove);
  window.removeEventListener('mouseup',onMouseUp);
  endDrag();
}

function onTouchStart(e){
  e.preventDefault();
  dragMoved=false;
  playSound('pickup');
  startDrag(e.currentTarget,e.touches[0].clientX,e.touches[0].clientY);
  window.addEventListener('touchmove',onTouchMove,{passive:false});
  window.addEventListener('touchend',onTouchEnd);
}
function onTouchMove(e){
  e.preventDefault();
  if(dragging){ dragMoved=true; moveDrag(e.touches[0].clientX,e.touches[0].clientY); }
}
function onTouchEnd(e){
  window.removeEventListener('touchmove',onTouchMove);
  window.removeEventListener('touchend',onTouchEnd);
  
  if(dragging && isMobile()){
    const t=e.changedTouches[0];
    const r=canvas.getBoundingClientRect();
    if(t.clientY>r.bottom){
      deleteInstance(dragging);
      dragging=null;
      return;
    }
  }
  endDrag();
}

function startDrag(el,cx,cy){
  dragging=el;
  const r=el.getBoundingClientRect();
  dragOffX=cx-r.left;dragOffY=cy-r.top;
  el.style.zIndex=50;el.style.transition='none';el.classList.add('selected');
}
function moveDrag(cx,cy){
  const r=canvas.getBoundingClientRect();
  dragging.style.left=(cx-r.left-dragOffX)+'px';
  dragging.style.top=(cy-r.top-dragOffY)+'px';
}
function endDrag(){
  if(!dragging)return;
  const el=dragging;
  el.style.zIndex=11;el.style.transition='';el.classList.remove('selected');
  dragging=null;

  
  const sb=document.getElementById('sidebar').getBoundingClientRect();
  const dr=el.getBoundingClientRect();
  const overSidebar=dr.right>sb.left&&dr.left<sb.right&&dr.bottom>sb.top&&dr.top<sb.bottom;
  if(overSidebar && !isMobile()){
    deleteInstance(el);
    return;
  }

  for(const other of canvasEls){
    if(other===el)continue;
    const or=other.getBoundingClientRect();
    if(!(dr.right<or.left||dr.left>or.right||dr.bottom<or.top||dr.top>or.bottom)){
      combine(el,other);return;
    }
  }
}

function combine(a, b){
  const d1=a._data, d2=b._data;
  const defined = lookupCombo(d1.name, d2.name);
  const result  = defined || smartFallback(d1.name, d2.name);

  if(!result){
    a.style.left = (parseFloat(a.style.left) - 30) + 'px';
    b.style.left = (parseFloat(b.style.left) + 30) + 'px';
    return;
  }

  playSound('combine');
  a.classList.add('combining');
  b.classList.add('combining');

  const isNew = !discovered.find(e => e.name === result.name);
  if(isNew){
    discovered.push({...result, id:nextId++, time:Date.now()});
    saveDiscovered();   
    renderSidebar();
    playSound('discovery');
  }

  document.getElementById('rEmoji').textContent = result.emoji;
  document.getElementById('rName').textContent  = result.name;
  document.getElementById('rCombo').textContent = `${d1.emoji} ${d1.name} + ${d2.emoji} ${d2.name}`;
  const rFirst = document.getElementById('rFirst');
  if(isNew){
    rFirst.style.display = 'block';
    rFirst.innerHTML = `<span>⭐ First Discovery!</span>`;
  } else {
    rFirst.style.display = 'none';
  }

  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);

  const mx = (parseFloat(a.style.left) + parseFloat(b.style.left)) / 2;
  const my = (parseFloat(a.style.top)  + parseFloat(b.style.top))  / 2;
  a.remove(); b.remove();
  canvasEls = canvasEls.filter(e => e !== a && e !== b);
  spawnInstance(result, mx, my);
}

const darkBtn = document.getElementById('darkBtn');
const savedDark = localStorage.getItem('jcraft_dark');
if (savedDark === '1') { document.body.classList.add('dark'); darkBtn.textContent = '☀️'; }
darkBtn.addEventListener('click', () => {
  const on = document.body.classList.toggle('dark');
  darkBtn.textContent = on ? '☀️' : '🌙';
  localStorage.setItem('jcraft_dark', on ? '1' : '0');
});

renderSidebar();
setTimeout(() => {
  const mob = isMobile();
  const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
  if(mob){
    
    const chipW=110, chipH=52, gap=14;
    const startX = cx - chipW - gap/2;
    const startY = Math.max(10, cy/2 - chipH);
    spawnInstance(STARTERS[0], startX,           startY);
    spawnInstance(STARTERS[1], startX+chipW+gap, startY);
    spawnInstance(STARTERS[2], startX,           startY+chipH+gap);
    spawnInstance(STARTERS[3], startX+chipW+gap, startY+chipH+gap);
  } else {
    spawnInstance(STARTERS[0], cx-320, cy-39);
    spawnInstance(STARTERS[1], cx-100, cy-39);
    spawnInstance(STARTERS[2], cx+120, cy-39);
    spawnInstance(STARTERS[3], cx-210, cy+80);
  }
}, 50);
</script>
